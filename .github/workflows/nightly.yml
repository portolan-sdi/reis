name: Mutation Testing

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mutation:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv python install 3.13
          # Include the data extra so mutmut can exercise the data pass tests.
          uv sync --extra data

      - name: Run mutation testing
        run: uv run mutmut run

      - name: Enforce mutation kill-rate floor
        run: |
          RESULTS=$(uv run mutmut results --all true)
          KILLED=$(echo "$RESULTS" | grep -c ': killed' || true)
          SURVIVED=$(echo "$RESULTS" | grep -c ': survived' || true)
          TOTAL=$((KILLED + SURVIVED))
          if [ "$TOTAL" -eq 0 ]; then
            echo "::error::No mutation results found — the run is broken."
            exit 1
          fi
          RATE=$((100 * KILLED / TOTAL))
          FLOOR=$(grep -v '^#' .mutation-baseline | head -1 | tr -d '[:space:]')
          {
            echo "## Mutation testing"
            echo ""
            echo "| Killed | Survived | Rate | Floor |"
            echo "|--------|----------|------|-------|"
            echo "| $KILLED | $SURVIVED | ${RATE}% | ${FLOOR}% |"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$RATE" -lt "$FLOOR" ]; then
            echo "::error::Mutation kill rate ${RATE}% is below the ${FLOOR}% floor."
            exit 1
          fi

      - name: Upload mutation artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mutation-results
          path: mutants/**/*.meta
          retention-days: 30
          if-no-files-found: ignore
