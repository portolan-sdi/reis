name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Nightly run catches dependency drift and flakiness on an idle repo.
    - cron: '15 2 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv python install 3.13
          uv sync

      - name: Run commit-stage hooks
        run: uv run pre-commit run --all-files --show-diff-on-failure

      - name: Run pre-push-stage hooks
        run: uv run pre-commit run --all-files --hook-stage pre-push --show-diff-on-failure

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # A nightly-scheduled failure is a new upstream CVE, not a regression in
    # this repo; report it without turning the badge red.
    continue-on-error: ${{ github.event_name == 'schedule' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv python install 3.13
          uv sync

      - name: Run bandit
        run: uv run bandit -r src/reis -c pyproject.toml

      - name: Run pip-audit
        run: |
          IGNORE_ARGS=$(uv run python scripts/pip_audit_ignores.py)
          # shellcheck disable=SC2086
          uv run pip-audit $IGNORE_ARGS

  test:
    runs-on: ${{ matrix.os }}-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu, macos, windows]
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          # diff-cover needs the base branch to compute the PR diff
          fetch-depth: 0

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv python install ${{ matrix.python-version }}
          # The data pass tests need the reis[data] extra; without it the data
          # checks skip and the coverage gate (checks.py) fails.
          uv sync --extra data

      - name: Run tests
        run: uv run pytest -n auto --cov --cov-report=xml

      - name: Enforce coverage on changed lines (PRs)
        if: github.event_name == 'pull_request' && matrix.os == 'ubuntu' && matrix.python-version == '3.13'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          uv run diff-cover coverage.xml \
            --compare-branch "origin/$BASE_REF" \
            --fail-under=90
